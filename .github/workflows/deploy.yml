# CI/CD: a cada push na main, builda as imagens de produção (api + web),
# publica no ghcr.io e dispara os webhooks do Portainer para a VPS atualizar.
#
# Secrets esperados (Settings → Secrets and variables → Actions):
#   PORTAINER_WEBHOOK_API — URL do webhook do serviço rcgcba_api no Portainer
#   PORTAINER_WEBHOOK_WEB — URL do webhook do serviço rcgcba_web no Portainer
# (sem eles o build/push funciona; só não redeploya sozinho)
name: Build & Deploy (VPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcgcba-api:latest
            ghcr.io/${{ github.repository_owner }}/rcgcba-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.rcgcba.bjsoft.com.br/api/v1
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcgcba-web:latest
            ghcr.io/${{ github.repository_owner }}/rcgcba-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Redeploy na VPS (webhooks do Portainer)
        env:
          WEBHOOK_API: ${{ secrets.PORTAINER_WEBHOOK_API }}
          WEBHOOK_WEB: ${{ secrets.PORTAINER_WEBHOOK_WEB }}
        run: |
          if [ -n "$WEBHOOK_API" ]; then
            curl -fsS -X POST "$WEBHOOK_API" && echo "api: redeploy disparado"
          else
            echo "PORTAINER_WEBHOOK_API não configurado; pulei o redeploy da api"
          fi
          if [ -n "$WEBHOOK_WEB" ]; then
            curl -fsS -X POST "$WEBHOOK_WEB" && echo "web: redeploy disparado"
          else
            echo "PORTAINER_WEBHOOK_WEB não configurado; pulei o redeploy do web"
          fi
