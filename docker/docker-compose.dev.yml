name: plataforma-comercial-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plataforma
      POSTGRES_PASSWORD: plataforma
      POSTGRES_DB: plataforma_comercial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plataforma -d plataforma_comercial"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MySQL de origem (dump legado rcgdistc_portal) para a rotina de importação.
  # O dump é carregado automaticamente na primeira subida (initdb) contra o
  # banco MYSQL_DATABASE. Para reimportar, remova o volume mysql_data.
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rcgdistc_portal
      MYSQL_USER: rcg
      MYSQL_PASSWORD: rcg
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backup/backup_mysql.sql:/docker-entrypoint-initdb.d/backup_mysql.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  mysql_data:
