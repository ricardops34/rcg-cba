name: plataforma-comercial-dev

services:
  deps:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile.dev
    working_dir: /app
    command: pnpm install --frozen-lockfile
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules

  db-init:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile.dev
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://plataforma:plataforma@postgres:5432/plataforma_comercial?schema=public
    command: >-
      sh -c "pnpm --filter @plataforma/contracts build &&
      pnpm --filter @plataforma/api prisma:generate &&
      pnpm --filter @plataforma/api prisma:deploy &&
      pnpm --filter @plataforma/api exec ts-node prisma/seed-base.ts"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile.dev
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://plataforma:plataforma@postgres:5432/plataforma_comercial?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: desenvolvimento-local-access
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: desenvolvimento-local-refresh
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
      CORS_ORIGIN: http://localhost:3002
    command: pnpm --filter @plataforma/api start:dev
    ports:
      - "3001:3001"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules
      - api_uploads:/app/apps/api/uploads
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile.dev
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    command: pnpm --filter web exec next dev -H 0.0.0.0 -p 3000
    ports:
      - "3002:3000"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plataforma
      POSTGRES_PASSWORD: plataforma
      POSTGRES_DB: plataforma_comercial
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plataforma -d plataforma_comercial"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MySQL de origem (dump legado rcgdistc_portal) para a rotina de importação.
  # O dump é carregado automaticamente na primeira subida (initdb) contra o
  # banco MYSQL_DATABASE. Para reimportar, remova o volume mysql_data.
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rcgdistc_portal
      MYSQL_USER: rcg
      MYSQL_PASSWORD: rcg
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  mysql_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  contracts_node_modules:
  api_uploads:
